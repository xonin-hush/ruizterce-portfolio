<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 660" role="img" aria-label="Architecture diagram: a standalone Astro landing page with no backend, and separately a Filament and Laravel admin dashboard that manages the heritage sites and content served by the mobile app">
  <g font-family="-apple-system, 'Segoe UI', sans-serif">
    <rect x="100" y="60" width="400" height="130" rx="14" fill="#f5f5f4" stroke="#a8a29e" stroke-width="2"/>
    <text x="300" y="118" text-anchor="middle" font-size="26" font-weight="700" fill="#1c1917">Landing page</text>
    <text x="300" y="155" text-anchor="middle" font-size="19" fill="#78716c">Astro · standalone</text>
    <rect x="100" y="290" width="400" height="130" rx="14" fill="#f5f5f4" stroke="#a8a29e" stroke-width="2"/>
    <text x="300" y="348" text-anchor="middle" font-size="26" font-weight="700" fill="#1c1917">Dashboard</text>
    <text x="300" y="385" text-anchor="middle" font-size="19" fill="#78716c">Filament · Laravel</text>
    <path d="M 300 420 L 300 493" fill="none" stroke="#38c172" stroke-width="3" stroke-dasharray="8 7"/>
    <circle cx="300" cy="493" r="6" fill="#38c172"/>
    <text x="315" y="463" font-size="18" fill="#78716c">sites · content</text>
    <rect x="100" y="500" width="400" height="130" rx="14" fill="#f5f5f4" stroke="#a8a29e" stroke-width="2"/>
    <text x="300" y="558" text-anchor="middle" font-size="26" font-weight="700" fill="#1c1917">Mobile app</text>
    <text x="300" y="595" text-anchor="middle" font-size="19" fill="#78716c">Tidio AI chat</text>
  </g>
</svg>
