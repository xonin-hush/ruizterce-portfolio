<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 660" role="img" aria-label="Architecture diagram: a web app connected through a WebSocket bridge to TWAIN and WIA scanner drivers">
  <rect width="600" height="660" fill="#f5f5f4"/>
  <g font-family="-apple-system, 'Segoe UI', sans-serif">
    <rect x="140" y="60" width="320" height="120" rx="14" fill="#e7e5e4" stroke="#a8a29e" stroke-width="2"/>
    <text x="300" y="115" text-anchor="middle" font-size="30" font-weight="700" fill="#1c1917">Web app</text>
    <text x="300" y="152" text-anchor="middle" font-size="20" fill="#78716c">vanilla-JS intake UI</text>
    <path d="M 300 185 C 300 215, 300 235, 300 262" fill="none" stroke="#38c172" stroke-width="3" stroke-dasharray="8 7"/>
    <circle cx="300" cy="262" r="6" fill="#38c172"/>
    <text x="320" y="235" font-size="20" fill="#78716c">WebSocket</text>
    <rect x="140" y="270" width="320" height="120" rx="14" fill="#e7e5e4" stroke="#a8a29e" stroke-width="2"/>
    <text x="300" y="325" text-anchor="middle" font-size="30" font-weight="700" fill="#1c1917">Scanner Bridge</text>
    <text x="300" y="362" text-anchor="middle" font-size="20" fill="#78716c">local Python service</text>
    <path d="M 300 395 C 300 425, 300 445, 300 472" fill="none" stroke="#38c172" stroke-width="3" stroke-dasharray="8 7"/>
    <circle cx="300" cy="472" r="6" fill="#38c172"/>
    <text x="320" y="445" font-size="20" fill="#78716c">TWAIN / WIA</text>
    <rect x="140" y="480" width="320" height="120" rx="14" fill="#e7e5e4" stroke="#a8a29e" stroke-width="2"/>
    <text x="300" y="535" text-anchor="middle" font-size="30" font-weight="700" fill="#1c1917">Scanners</text>
    <text x="300" y="572" text-anchor="middle" font-size="20" fill="#78716c">any vendor</text>
  </g>
</svg>
